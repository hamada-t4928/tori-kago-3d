<!-- 軽量版：地形と航空写真を高速化 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tori-kago v12 light</title>
<style>
body{margin:0;overflow:hidden;background:#f3f4f6;font-family:sans-serif}
#loading{position:absolute;top:20px;left:20px;background:white;padding:10px;border-radius:8px}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="loading">軽量モード読込中...</div>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,5000);
camera.position.set(500,400,800);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,1));

// 地形（軽量：分割を大幅削減）
const geo=new THREE.PlaneGeometry(1200,1200,40,40);
geo.rotateX(-Math.PI/2);

// 擬似標高（簡易ノイズ）
const pos=geo.attributes.position;
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i);
  const z=pos.getZ(i);
  const h=Math.sin(x*0.005)*5+Math.cos(z*0.005)*5;
  pos.setY(i,h);
}

geo.computeVertexNormals();

// 軽量テクスチャ（1枚だけ取得）
const tex=new THREE.TextureLoader().load("https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/15/29105/12902.jpg",render);

const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:tex}));
scene.add(mesh);

// 建物
const building=new THREE.Mesh(
  new THREE.BoxGeometry(60,130,70),
  new THREE.MeshStandardMaterial({color:0x60a5fa})
);
building.position.set(0,65,0);
scene.add(building);

// 東京タワー（簡略）
const tower=new THREE.Mesh(
  new THREE.CylinderGeometry(5,15,333,8),
  new THREE.MeshStandardMaterial({color:0xdc2626})
);
tower.position.set(80,166,-580);
scene.add(tower);

document.getElementById("loading").style.display="none";

function render(){
  requestAnimationFrame(render);
  controls.update();
  renderer.render(scene,camera);
}
render();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
