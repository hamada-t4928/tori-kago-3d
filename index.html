
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tori-kago Sample v2</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: #f3f4f6;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,0.92);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 10;
    }

    #legend {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 220px;
      background: rgba(255,255,255,0.94);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 10;
    }

    .bar {
      margin-top: 8px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        hsl(210 65% 58%),
        hsl(165 65% 58%),
        hsl(95 65% 58%),
        hsl(40 65% 58%),
        hsl(20 65% 58%)
      );
      border: 1px solid rgba(0,0,0,0.08);
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: #334155;
    }

    #errorBox {
      position: absolute;
      top: 120px;
      left: 12px;
      right: 12px;
      background: rgba(220, 38, 38, 0.95);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 20;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="info">
    <strong>3D Tori-kago Sample</strong><br>
    ドラッグで回転 / ホイールでズーム / 右ドラッグで移動<br>
    ※ 左上の「,,」のように見える文字が出る場合は、このファイルに完全置換してください
  </div>

  <div id="legend">
    <strong>ヒートマップ凡例（専有坪単価）</strong>
    <div class="bar"></div>
    <div class="legend-row"><span>下限</span><span>1,500万円 / 専有坪</span></div>
    <div class="legend-row"><span>平均</span><span id="avgTsuboPrice">計算中...</span></div>
    <div class="legend-row"><span>上限</span><span>2,300万円 / 専有坪</span></div>
    <div style="margin-top:8px;color:#475569;">
      低価格帯 = 青系 / 平均帯 = 緑系 / 高価格帯 = 橙〜赤系
    </div>
  </div>

  <div id="errorBox"></div>

  <script type="module">
    const errorBox = document.getElementById("errorBox");
    const avgLabel = document.getElementById("avgTsuboPrice");

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = "JavaScriptエラーが発生しました:\n\n" + message;
      console.error(message);
    }

    try {
      import("three")
        .then(async (THREE) => {
          const controlsModule = await import("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js");
          const OrbitControls = controlsModule.OrbitControls;

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0xf3f4f6);

          const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
          );
          camera.position.set(28, 24, 32);

          const renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setSize(window.innerWidth, window.innerHeight);
          renderer.setPixelRatio(window.devicePixelRatio);
          document.body.appendChild(renderer.domElement);

          const controls = new OrbitControls(camera, renderer.domElement);
          controls.enableDamping = true;
          controls.dampingFactor = 0.06;
          controls.target.set(0, 8, 0);

          const ambient = new THREE.AmbientLight(0xffffff, 0.9);
          scene.add(ambient);

          const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
          light1.position.set(30, 40, 15);
          scene.add(light1);

          const light2 = new THREE.DirectionalLight(0xffffff, 0.35);
          light2.position.set(-25, 20, -18);
          scene.add(light2);

          const grid = new THREE.GridHelper(42, 42, 0xcbd5e1, 0xe5e7eb);
          scene.add(grid);

          // -----------------------------
          // 坪単価設定
          // 下限 1,500万円/坪
          // 上限 2,300万円/坪
          // -----------------------------
          const TSUBO_MIN = 1500;
          const TSUBO_MAX = 2300;

          function colorFromTsuboUnit(tsuboPrice) {
            const t = (tsuboPrice - TSUBO_MIN) / (TSUBO_MAX - TSUBO_MIN || 1);
            const color = new THREE.Color();
            color.setHSL(0.58 - 0.52 * t, 0.60, 0.58);
            return color;
          }

          // -----------------------------
          // ロの字型住戸配置（センターコア）
          // 20階建、2F〜20F住宅
          // 中央は空洞（コア）
          // -----------------------------
          const residentialFloors = [];
          for (let f = 2; f <= 20; f++) residentialFloors.push(f);

          const floorHeight = 0.9;
          const outerWBase = 17.6;
          const outerDBase = 13.2;
          const coreW = 5.8;
          const coreD = 4.4;
          const unitDepth = 2.1; // リング厚み

          function setbackForFloor(f) {
            if (f >= 18) return 0.9;
            if (f >= 15) return 0.45;
            if (f >= 10) return 0.2;
            return 0;
          }

          function makeHorizontalRow(y, z, totalWidth, blockDepth, floor, side, outerD) {
            const units = [];
            const widths = [2.0, 2.35, 2.5, 2.65, 2.5, 2.35, 2.0];
            const gapX = 0.08;
            const sumW = widths.reduce((a, b) => a + b, 0) + gapX * (widths.length - 1);
            const scale = totalWidth / sumW;
            const scaled = widths.map(w => w * scale);
            const totalScaled = scaled.reduce((a, b) => a + b, 0) + gapX * (scaled.length - 1);
            let cursorX = -totalScaled / 2;

            scaled.forEach((w, idx) => {
              const x = cursorX + w / 2;
              cursorX += w + gapX;
              const areaTsuboBase = (w * blockDepth) * 1.45;
              const areaTsubo = +(areaTsuboBase + (idx % 2 === 0 ? 0.6 : -0.2)).toFixed(1);
              const areaM2 = +(areaTsubo * 3.305785).toFixed(1);
              const floorPremium = (floor - 2) / 18;
              const centerPenalty = Math.abs(idx - 3) * 28;
              const sidePremium = (side === 'south' ? 90 : side === 'north' ? 20 : 55);
              const topPremium = floor >= 18 ? 70 : floor >= 15 ? 35 : 0;
              let tsuboPrice = TSUBO_MIN + 420 * floorPremium + sidePremium - centerPenalty + topPremium;
              tsuboPrice = Math.max(TSUBO_MIN, Math.min(TSUBO_MAX, Math.round(tsuboPrice)));
              units.push({
                x, y, z,
                w, h: floorHeight, d: blockDepth,
                floor, side,
                areaTsubo,
                areaM2,
                tsuboPrice,
              });
            });
            return units;
          }

          function makeVerticalRow(x, y, zCenter, blockWidth, totalDepth, floor, side) {
            const units = [];
            const depths = [1.9, 2.25, 2.45, 2.25, 1.9];
            const gapZ = 0.08;
            const sumD = depths.reduce((a, b) => a + b, 0) + gapZ * (depths.length - 1);
            const scale = totalDepth / sumD;
            const scaled = depths.map(d => d * scale);
            const totalScaled = scaled.reduce((a, b) => a + b, 0) + gapZ * (scaled.length - 1);
            let cursorZ = zCenter - totalScaled / 2;

            scaled.forEach((d, idx) => {
              const z = cursorZ + d / 2;
              cursorZ += d + gapZ;
              const areaTsuboBase = (blockWidth * d) * 1.55;
              const areaTsubo = +(areaTsuboBase + (idx % 2 === 0 ? 0.3 : -0.1)).toFixed(1);
              const areaM2 = +(areaTsubo * 3.305785).toFixed(1);
              const floorPremium = (floor - 2) / 18;
              const centerPenalty = Math.abs(idx - 2) * 24;
              const sidePremium = (side === 'east' ? 65 : 70);
              const topPremium = floor >= 18 ? 70 : floor >= 15 ? 35 : 0;
              let tsuboPrice = TSUBO_MIN + 420 * floorPremium + sidePremium - centerPenalty + topPremium;
              tsuboPrice = Math.max(TSUBO_MIN, Math.min(TSUBO_MAX, Math.round(tsuboPrice)));
              units.push({
                x, y, z,
                w: blockWidth, h: floorHeight, d,
                floor, side,
                areaTsubo,
                areaM2,
                tsuboPrice,
              });
            });
            return units;
          }

          const units = [];

          residentialFloors.forEach(floor => {
            const setback = setbackForFloor(floor);
            const outerW = outerWBase - setback;
            const outerD = outerDBase - setback * 0.75;
            const ringInnerW = coreW;
            const ringInnerD = coreD;
            const y = (floor - 2) * floorHeight + 1.05;

            const northZ = -(ringInnerD / 2 + unitDepth / 2);
            const southZ = +(ringInnerD / 2 + unitDepth / 2);
            const eastX = +(ringInnerW / 2 + unitDepth / 2);
            const westX = -(ringInnerW / 2 + unitDepth / 2);

            const horizontalSpan = outerW;
            const verticalSpan = outerD - unitDepth * 2.0 - 0.5;

            units.push(...makeHorizontalRow(y, northZ, horizontalSpan, unitDepth, floor, 'north', outerD));
            units.push(...makeHorizontalRow(y, southZ, horizontalSpan, unitDepth, floor, 'south', outerD));
            units.push(...makeVerticalRow(eastX, y, 0, unitDepth, verticalSpan, floor, 'east'));
            units.push(...makeVerticalRow(westX, y, 0, unitDepth, verticalSpan, floor, 'west'));
          });

          const avgTsubo = Math.round(units.reduce((s, u) => s + u.tsuboPrice, 0) / units.length);
          avgLabel.textContent = avgTsubo.toLocaleString() + "万円 / 専有坪";

          // -----------------------------
          // 1階ポディウム
          // -----------------------------
          const podiumGeo = new THREE.BoxGeometry(outerWBase + 2.4, 1.0, outerDBase + 2.2);
          const podiumMat = new THREE.MeshStandardMaterial({
            color: 0xb8c0cc,
            transparent: true,
            opacity: 0.7
          });
          const podium = new THREE.Mesh(podiumGeo, podiumMat);
          podium.position.set(0, 0.5, 0);
          scene.add(podium);

          const podiumEdges = new THREE.EdgesGeometry(podiumGeo);
          const podiumLine = new THREE.LineSegments(
            podiumEdges,
            new THREE.LineBasicMaterial({ color: 0x64748b })
          );
          podiumLine.position.copy(podium.position);
          scene.add(podiumLine);

          // -----------------------------
          // センターコア（見えるように薄灰色で表示）
          // -----------------------------
          const coreGeo = new THREE.BoxGeometry(coreW, residentialFloors.length * floorHeight, coreD);
          const coreMat = new THREE.MeshStandardMaterial({
            color: 0xd1d5db,
            transparent: true,
            opacity: 0.45
          });
          const core = new THREE.Mesh(coreGeo, coreMat);
          core.position.set(0, 1.05 + (residentialFloors.length * floorHeight) / 2 - floorHeight / 2, 0);
          scene.add(core);

          const coreEdges = new THREE.EdgesGeometry(coreGeo);
          const coreLine = new THREE.LineSegments(
            coreEdges,
            new THREE.LineBasicMaterial({ color: 0x94a3b8 })
          );
          coreLine.position.copy(core.position);
          scene.add(coreLine);

          // -----------------------------
          // 住戸ボックス
          // -----------------------------
          units.forEach(u => {
            const geo = new THREE.BoxGeometry(u.w, u.h, u.d);
            const mat = new THREE.MeshStandardMaterial({
              color: colorFromTsuboUnit(u.tsuboPrice)
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(u.x, u.y, u.z);
            scene.add(mesh);

            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(
              edges,
              new THREE.LineBasicMaterial({ color: 0x4b5563 })
            );
            line.position.copy(mesh.position);
            scene.add(line);
          });

          function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
          }
          animate();

          window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
          });
        })
        .catch(err => {
          showError(err && err.stack ? err.stack : String(err));
        });
    } catch (e) {
      showError(e && e.stack ? e.stack : String(e));
    }
  </script>
</body>
</html>
