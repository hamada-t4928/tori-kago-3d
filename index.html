
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3D Tori-kago Sample</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    .hint {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.85);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="hint">ドラッグで回転 / ホイールでズーム</div>
  https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js
  https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f5);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(15, 18, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;

    const light1 = new THREE.DirectionalLight(0xffffff, 0.9);
    light1.position.set(20, 30, 10);
    scene.add(light1);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    // ---- 建物作成（20階・2階以上住宅） ----
    const material = new THREE.MeshStandardMaterial({ color: 0x8da9c4 });
    const floors = 19;
    const unitsPerFloor = 8;

    for (let f = 0; f < floors; f++) {
      for (let u = 0; u < unitsPerFloor; u++) {
        const boxGeo = new THREE.BoxGeometry(0.9, 0.6, 2.2);
        const mesh = new THREE.Mesh(boxGeo, material.clone());

        mesh.position.x = (u - unitsPerFloor / 2) * 1.0;
        mesh.position.y = f * 0.7 + 1;
        mesh.position.z = 0;

        mesh.material.color.setHSL(0.58 - f * 0.01 + u * 0.005, 0.45, 0.6);
        scene.add(mesh);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
